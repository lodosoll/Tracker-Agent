def get_now_rome():
    rome_tz = pytz.timezone("Europe/Rome")
    return datetime.now(rome_tz).strftime("%d/%m/%Y %H:%M:%S")

def send_notification():
    if not GMAIL_PASSWORD:
        print("ERRORE: GMAIL_PASSWORD non impostata nei Secrets di GitHub.")
        return

    now = get_now_rome()
    
    msg = EmailMessage()
    msg.set_content(f"TEST: Il sistema di monitoraggio Dreame funziona!\n\nSe ricevi questa email, la configurazione è corretta.\n\nRilevato il: {now} (Orario Roma)")
    msg['Subject'] = f"TEST FUNZIONANTE: Tracker Dreame - {now}"
    msg['From'] = EMAIL_SENDER
    msg['To'] = ", ".join(EMAIL_RECEIVERS)

    context = ssl.create_default_context()
    
    try:
        with smtplib.SMTP_SSL("smtp.gmail.com", 465, context=context) as server:
            server.login(EMAIL_SENDER, GMAIL_PASSWORD)
            server.send_message(msg)
        print(f"Email di prova inviata con successo!")
    except Exception as e:
        print(f"ERRORE DURANTE L'INVIO: {e}")
        print("Verifica che la 'Password per le app' di Google sia corretta.")

if __name__ == "__main__":
    check_availability()
