name: Check Product Availability

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Aggiornato a v4

    - name: Set up Python
      uses: actions/setup-python@v5 # Aggiornato a v5
      with:
        python-version: '3.11' # Usiamo una versione di Python più recente

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pytz

    - name: Run script
      env:
        GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
      run: python main.py
